<header class="navbar">

  <!-- Right: Title -->
  <div class="navbar__right">
    <button (click)="onToggleSidebar()" class="navbar__menu-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div>
      <h1 class="navbar__title">{{ title || 'לוח בקרה' }}</h1>
    </div>
  </div>

  <!-- Left: Balance + User -->
  <div class="navbar__left">

    <!-- Balance Pill -->
    <div class="navbar__balance">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1A7F4B" stroke-width="2.5">
        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      <span>₪{{ accountBalance() | number:'1.2-2' }}</span>
    </div>

    <!-- User -->
    <div class="navbar__user">
      <div class="navbar__avatar">
        {{ currentUser().charAt(0) || '?' }}
      </div>
      <span>{{ currentUser() }}</span>
    </div>

    <!-- Logout -->
    <button (click)="logout()" class="navbar__logout">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>יציאה</span>
    </button>
  </div>
</header>
