<aside class="sidebar" [class.sidebar--collapsed]="collapsed">

  <!-- Logo -->
  <div class="sidebar__logo">
    <div class="sidebar__logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/>
      </svg>
    </div>
    <span *ngIf="!collapsed" class="sidebar__logo-text">FinanceIL</span>
    <button *ngIf="!collapsed" (click)="toggleCollapse.emit()" class="sidebar__toggle">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <button *ngIf="collapsed" (click)="toggleCollapse.emit()" class="sidebar__toggle">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    <p class="sidebar__section" *ngIf="!collapsed">תפריט ראשי</p>

    <a *ngFor="let link of userLinks"
       [routerLink]="link.route"
       routerLinkActive="active"
       class="sidebar__link"
       [title]="collapsed ? link.label : ''">
      <span [innerHTML]="getIcon(link.icon)"></span>
      <span *ngIf="!collapsed" class="sidebar__link-label">{{ link.label }}</span>
    </a>

    <ng-container *ngIf="isAdmin">
      <hr class="sidebar__divider"/>
      <p class="sidebar__section" *ngIf="!collapsed">ניהול מערכת</p>
      <a *ngFor="let link of adminLinks"
         [routerLink]="link.route"
         routerLinkActive="active"
         class="sidebar__link"
         [title]="collapsed ? link.label : ''">
        <span [innerHTML]="getIcon(link.icon)"></span>
        <span *ngIf="!collapsed" class="sidebar__link-label">{{ link.label }}</span>
      </a>
    </ng-container>
  </nav>

  <!-- User + Logout -->
  <div class="sidebar__footer">
    <div class="sidebar__user-block" *ngIf="!collapsed">
      <div class="sidebar__user-avatar">
        {{ currentUser.charAt(0) }}
      </div>
      <div>
        <p class="sidebar__user-name">{{ currentUser }}</p>
        <p class="sidebar__user-role">
          {{ isAdmin ? 'מנהל מערכת' : 'משתמש' }}
        </p>
      </div>
    </div>
    <button (click)="logout()" class="sidebar__logout-btn" title="התנתק">
      <span [innerHTML]="getIcon('logout')"></span>
      <span *ngIf="!collapsed">התנתק</span>
    </button>
  </div>
</aside>
